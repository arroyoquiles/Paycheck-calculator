<html lang="en" style="background:#0b1220;">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#0b1220"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="My Budget"/>
  <title>My Budget</title>
  <script>
  (function(){
    const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#0b1220"/><rect x="76" y="158" width="324" height="224" rx="30" fill="none" stroke="white" stroke-width="22"/><rect x="318" y="188" width="102" height="72" rx="18" fill="none" stroke="white" stroke-width="18"/><circle cx="371" cy="224" r="13" fill="white"/><line x1="156" y1="118" x2="206" y2="158" stroke="white" stroke-width="21" stroke-linecap="round"/><line x1="238" y1="106" x2="268" y2="158" stroke="white" stroke-width="21" stroke-linecap="round"/><text x="100" y="330" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif" font-size="96" font-weight="700" fill="white">MB</text></svg>';
    // Update splash icon color based on saved theme - run after DOM ready
    document.addEventListener('DOMContentLoaded',()=>{
      try{
        const saved=JSON.parse(localStorage.getItem('mybudget_v17')||'{}');
        const th=saved.theme||'dark';
        const accents={dark:'#58a6ff',violet:'#a78bfa',green:'#3fb950',pink:'#ec4899',orange:'#f97316',black:'#ffffff',copper:'#c2823a',teal:'#06b6d4',gold:'#d29922',light:'#0969da'};
        const bgs={dark:'#0b1220',violet:'#0a0814',green:'#08140c',pink:'#140810',orange:'#140e08',black:'#000000',copper:'#130f08',teal:'#08141a',gold:'#14110a',light:'#f0f4f8'};
        const accent=accents[th]||'#58a6ff';
        const bg=bgs[th]||'#080c14';
        const splash=document.getElementById('splash');
        if(splash){
          splash.style.background=bg;
          const title=splash.querySelector('.st');
          if(title)title.style.backgroundImage=`linear-gradient(120deg,white 0%,white 50%,${accent} 100%)`;
          const svgEl=splash.querySelector('svg rect');
          if(svgEl)svgEl.setAttribute('fill',bg);
        }
      }catch(e){}
    });
    const enc=encodeURIComponent(svg);
    const m={name:"My Budget",short_name:"My Budget",start_url:"/",display:"standalone",background_color:"#0b1220",theme_color:"#0b1220",icons:[{src:"data:image/svg+xml,"+enc,sizes:"512x512",type:"image/svg+xml"},{src:"data:image/svg+xml,"+enc,sizes:"192x192",type:"image/svg+xml"}]};
    const b=new Blob([JSON.stringify(m)],{type:"application/json"});
    const l=document.createElement("link");l.rel="manifest";l.href=URL.createObjectURL(b);document.head.appendChild(l);
    const al=document.createElement("link");al.rel="apple-touch-icon";al.href="data:image/svg+xml,"+enc;document.head.appendChild(al);
  })();
  </script>

    <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;transition:background 0.2s,color 0.2s;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.01em;}
    *{-webkit-tap-highlight-color:transparent;}
    div,span{-webkit-user-select:none;user-select:none;}
    input,textarea,select{-webkit-user-select:text;user-select:text;}
    body.dark{background:#0b1220;color:#e6edf3;}
    body.light{background:#f0f4f8;color:#1c2128;}
    body.violet{background:#0a0814;color:#e6edf3;}
    body.green{background:#08140c;color:#e6edf3;}
    body.pink{background:#140810;color:#e6edf3;}
    body.orange{background:#140e08;color:#e6edf3;}
    body.black{background:#000000;color:#ffffff;}
    body.copper{background:#130f08;color:#e6edf3;}
    body.teal{background:#08141a;color:#e6edf3;}
    body.gold{background:#14110a;color:#e6edf3;}
    #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#0b1220;transition:opacity 0.5s ease;}
    #splash.hide{opacity:0;pointer-events:none;}
    #splash svg{animation:splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;}
